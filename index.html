<!DOCTYPE html>
<html lang="en">

<head> <!-- will appear in the main search bar on top of the page -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Landing Page</title>
  <link rel="stylesheet" href="./style.css"> <!-- Link to external CSS file for styling the landing page -->
</head>

<body> <!-- What will appear inside the main page contains all the visible content and elements that users will interact with. -->

  <!-- Top Navigation Tab Group; bookmark; gmail; Image; Labs etc.-->
  <div class="top-nav">

    <!--Left Navigation Tab Groups-->
    <div class="left-nav">
      <span>Tab Groups</span>
      <span>All Bookmarks</span>
    </div>

    <!--Right Navigation Gmail-->
    <div class="right-nav">
      <a href="#">Aap</a>
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <a href="#">Labs</a>
      <a href="#">Apps</a>
      <img src="images/profile.png" alt="Profile" class="profile-icon">
    </div>

  </div>

  <!-- Logo Octavia-->
  <div class="logo">
    <span class="blue">O</span>
    <span class="red">c</span>
    <span class="yellow">t</span>
    <span class="blue">a</span>
    <span class="green">v</span>
    <span class="red">i</span>
    <span class="yellow">a</span>
  </div>


  <!-- Search bar -->
  <div class="search-bar">
    <form action="https://www.google.com/search" method="GET">
      <div class="input-wrapper">
        
        <!-- The name 'q' is required by Google -->
        <input type="text" name="q" placeholder="Search or type a URL">
        <button type="button" id="aiButton">AI Mode</button>
      </div>
    </form>
  </div>

  <!-- Shortcuts -->
  <div class="shortcuts">
  
    <div class="shortcut">
      <div class="hover-box"></div> 
    
      <div class="menu-container">
        <button class="menu-btn">⋮</button>
        
        <div class="menu-dropdown">
          <div class="menu-item edit-btn">Edit</div>
          <div class="menu-item delete-btn">Delete</div>
        </div>
      
      </div>

      <div class="icon">
      <img src="./images/aidreamina.jpg" alt="AI Dreamina">
      </div>
    
      <span>AI Dreamina</span>
    </div>
  
  <div class="shortcut add-shortcut">
    <div class="hover-box"></div>
    
    <div class="menu-container">
      <button class="menu-btn">⋮</button>
   
      <div class="menu-dropdown">
        <div class="menu-item edit-btn">Edit</div>
        <div class="menu-item delete-btn">Delete</div>
      </div>
   
    </div>

    <div class="icon">
      <img src="./images/add.jpg" alt="Add shortcut">
    </div>
   
    <span>Add shortcut</span>
  
  </div>

</div>

<!-- Add Shortcut Modal -->
<div id="addShortcutModal" class="modal">
  <div class="modal-content">
    <h2>Add Shortcut</h2>
    <label for="shortcutName" style="display:block; margin-left: 25px; text-align: left;">Name:</label>
      <input type="text" id="shortcutName" placeholder="Shortcut name">
    <label for="shortcutURL"style="display:block; margin-left: 25px; text-align: left;">URL:</label>
      <input type="text" id="shortcutURL" placeholder="Shortcut URL">
    <div class="modal-buttons">
      <button type="button" id="saveShortcut">Save</button>
      <button type="button" id="cancelShortcut">Cancel</button>
    </div>
  </div>
</div>

  <!-- Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Landing page script loaded');

      // --- 1. 3-DOT MENU LOGIC ---
      document.addEventListener('click', (e) => {
        const menuBtn = e.target.closest('.menu-btn');

        if (menuBtn) {
          e.preventDefault();
          e.stopPropagation();

          const dropdown = menuBtn.nextElementSibling;
          document.querySelectorAll('.menu-dropdown').forEach(menu => {
            if (menu !== dropdown) menu.classList.remove('show');
          });

          dropdown.classList.toggle('show');
        } else {
          document.querySelectorAll('.menu-dropdown').forEach(menu => {
            menu.classList.remove('show');
          });
        }
      });

      // --- 2. MENU ITEM ACTIONS (Edit/Delete) ---
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) {
          const shortcut = e.target.closest('.shortcut');
          if (confirm('Are you sure you want to delete this shortcut?')) {
            shortcut.remove();
          }
        }

        if (e.target.classList.contains('edit-btn')) {
          const shortcut = e.target.closest('.shortcut');
          const currentName = shortcut.querySelector('span').innerText;
          const newName = prompt('Enter new name:', currentName);
          if (newName) {
            shortcut.querySelector('span').innerText = newName;
          }
        }
      });

      // --- 3. MODAL LOGIC (Add Shortcut) ---
      const modal = document.getElementById('addShortcutModal');
      const addBtn = document.querySelector('.add-shortcut');
      const cancelBtn = document.getElementById('cancelShortcut');
      const saveBtn = document.getElementById('saveShortcut');

      if (addBtn) {
        addBtn.addEventListener('click', () => {
          modal.style.display = 'block';
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          modal.style.display = 'none';
        });
      }

      window.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      });

      function getFaviconUrl(url) {
        try {
          const parsedUrl = new URL(url.startsWith('http') ? url : `https://${url}`);
          return `https://www.google.com/s2/favicons?sz=64&domain=${parsedUrl.hostname}`;
        } catch (error) {
          return './images/add.jpg';
        }
      }

      function createShortcutElement(name, url) {
        const shortcut = document.createElement('div');
        shortcut.className = 'shortcut';

        const hoverBox = document.createElement('div');
        hoverBox.className = 'hover-box';

        const menuContainer = document.createElement('div');
        menuContainer.className = 'menu-container';
        menuContainer.innerHTML = `
          <button class="menu-btn">⋮</button>
          <div class="menu-dropdown">
            <div class="menu-item edit-btn">Edit</div>
            <div class="menu-item delete-btn">Delete</div>
          </div>
        `;

        const icon = document.createElement('div');
        icon.className = 'icon';

        const img = document.createElement('img');
        img.alt = name;
        img.src = getFaviconUrl(url);
        img.onerror = () => {
          img.src = './images/add.jpg';
        };
        icon.appendChild(img);

        const label = document.createElement('span');
        label.textContent = name;

        shortcut.appendChild(hoverBox);
        shortcut.appendChild(menuContainer);
        shortcut.appendChild(icon);
        shortcut.appendChild(label);

        shortcut.addEventListener('click', (event) => {
          if (!event.target.closest('.menu-container')) {
            window.open(url.startsWith('http') ? url : `https://${url}`, '_blank');
          }
        });

        return shortcut;
      }

      if (saveBtn) {
        saveBtn.addEventListener('click', () => {
          const name = document.getElementById('shortcutName').value.trim();
          const url = document.getElementById('shortcutURL').value.trim();
          const shortcutsContainer = document.querySelector('.shortcuts');

          if (name && url) {
            const newShortcut = createShortcutElement(name, url);
            if (shortcutsContainer && addBtn) {
              shortcutsContainer.insertBefore(newShortcut, addBtn);
            }

            alert('Shortcut saved: ' + name);
            modal.style.display = 'none';
            document.getElementById('shortcutName').value = '';
            document.getElementById('shortcutURL').value = '';
          } else {
            alert('Please fill in both fields.');
          }
        });
      }

      const aiBtn = document.getElementById('aiButton');
      if (aiBtn) {
        aiBtn.addEventListener('click', () => {
          alert('AI Mode Activated!');
        });
      }
    });
  </script>
</body>
</html>
